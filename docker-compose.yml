services:
  app:
    build: .
    container_name: gemini-free-api
    ports:
      - "8787:8787"
    extra_hosts:
      # Lets Linux Docker containers reach services listening on the host.
      # Use host.docker.internal in *_PROXY values when the proxy runs on the host.
      - "host.docker.internal:host-gateway"
    env_file:
      - .env
    environment:
      # This single image does not ship Node/Chromium, so the cookie worker
      # cannot run inside it. The app also auto-skips it when the worker dir is
      # missing; set false explicitly to keep logs clean.
      - GEMINI_COOKIE_WORKER_ENABLED=false
      # Avoid slow sequential RotateCookies calls for every account on container
      # start. Keep ./data mounted and sync cookies from the host worker instead.
      - GEMINI_STARTUP_COOKIE_ROTATE=false
    restart: unless-stopped
    volumes:
      # Persist cookie cache + account rotation state across restarts.
      # App WORKDIR is /home/appuser. Written paths:
      #   data/cookies/  <- GEMINI_COOKIE_CACHE_PATH
      #   data/state/    <- GEMINI_ACCOUNT_STATE_PATH
      - ./data:/home/appuser/data
      # Hard-coded cookie jar dir (gemini_service.go).
      - ./.cookies:/home/appuser/.cookies
      # Mount .env as read-only so config changes take effect on
      # `docker compose restart` — NO rebuild needed.
      # The app calls godotenv.Overload() at startup which reads this file
      # and overrides env vars set by env_file above.
      - ./.env:/home/appuser/.env:ro
    healthcheck:
      # NOTE: must be a real GET, not `wget --spider`. --spider issues a HEAD,
      # but /health is GET-only (Fiber app.Get), so HEAD returns 404 and wget
      # exits 8, falsely marking the container unhealthy.
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--timeout=5",
          "-O",
          "/dev/null",
          "http://localhost:8787/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

